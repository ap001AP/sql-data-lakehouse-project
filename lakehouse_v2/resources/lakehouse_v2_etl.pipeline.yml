# The main pipeline for lakehouse_v2

resources:
  pipelines:
    lakehouse_v2_etl:
      name: lakehouse_v2_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/lakehouse_v2_etl"

      libraries:
        - glob:
            include: ../src/lakehouse_v2_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
